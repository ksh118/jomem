<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff; /* 배경색 (흰색) */
            font-family: 'Pretendard', sans-serif;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        /* 상단 이미지 스타일 */
        .error-image {
            width: 100%;
            max-width: 400px; /* 이미지 최대 크기 조절 */
            height: auto;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 48px;
            color: #333;
            margin: 0;
        }

        p {
            font-size: 18px;
            color: #666;
            margin: 15px 0 30px 0;
            line-height: 1.6;
        }

        /* 홈으로 가기 버튼 */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 상단에 사진 배치 -->
        <img src="https://i.ibb.co/6ndz1xH/1733221375990.jpg" alt="Error Image" class="error-image">

        <!-- 아래에 404 메시지 배치 -->
        <h1>404</h1>
        <p>요청하신 페이지를 찾을 수 없습니다.<br>입력하신 주소가 맞는지 다시 한번 확인해 주세요.</p>
        
        <a href="/" class="btn">메인으로 돌아가기</a>
    </div>

</body>
</html>
