<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f9f9f9; /* 연한 회색 배경으로 변경 */
            font-family: 'Pretendard', sans-serif;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 20px;
            background: white; /* 박스 형태 디자인 */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* GIF 이미지 스타일: 크기를 살짝 작게 조정 */
        .error-gif {
            width: 100%;
            max-width: 250px; /* 크기를 250px로 줄임 */
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 40px;
            color: #333;
            margin: 10px 0;
        }

        p {
            font-size: 16px;
            color: #777;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 버튼 스타일 */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #4A90E2; /* 산뜻한 파란색 */
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 요청하신 GIF 이미지 -->
        <img src="https://i.ibb.co/VpNG3CG5/5.gif" alt="Error GIF" class="error-gif">

        <h1>404</h1>
        <p>길을 잃으신 것 같아요!<br>찾으시는 페이지가 삭제되었거나 주소가 틀렸습니다.</p>
        
        <a href="/" class="btn">홈으로 돌아가기</a>
    </div>

</body>
</html>
