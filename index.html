<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조밈 시참 설명서</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg: #ffffff;
            --text: #37352f;
            --sub: #787774;
            --border: #e9e9e8;
            --hover: #f7f6f3;
            --red: #eb5757;
        }

        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; color: var(--text); background: var(--bg); }
        .header-img { width: 100%; height: 260px; background: url('https://yt3.googleusercontent.com/iRxRpoSE9bFfXZOMhJwfmGfXRhEGDyVTjsanJN33qsnfjP94GVrYk4rZwj6gnfOWYJApvTg-FQ=w1138-fcrop64=1,00005a57ffffa5a8-k-c0xffffffff-no-nd-rj') center/cover; }
        .container { max-width: 800px; margin: -60px auto 100px; padding: 0 20px; position: relative; }
        
        .profile {
            width: 130px; height: 130px; border-radius: 28px;
            background: white; border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden; margin-bottom: 20px;
        }
        .profile img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 38px; font-weight: 800; margin: 0; }
        .top-desc { color: var(--sub); margin: 10px 0 40px; font-size: 16px; }

        /* 메인 메뉴 화면 */
        .menu-page { display: block; }
        .label { font-size: 14px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 10px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn {
            display: flex; align-items: center; padding: 18px 24px;
            border: 1px solid var(--border); border-radius: 12px;
            background: white; cursor: pointer; transition: 0.2s ease;
        }
        .btn:hover { background: var(--hover); transform: translateY(-2px); }
        .btn img { width: 26px; height: 26px; margin-right: 14px; }
        .btn span { font-size: 17px; font-weight: 600; }

        /* 상세 페이지 화면 */
        .detail-page { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .back-nav {
            display: inline-flex; align-items: center; cursor: pointer;
            color: var(--sub); font-weight: 600; margin-bottom: 30px;
            padding: 8px 12px; border-radius: 6px;
        }
        .back-nav:hover { background: var(--hover); color: var(--text); }

        .content { line-height: 1.8; }
        .content h2 { font-size: 32px; margin-bottom: 25px; display: flex; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .content h2 img { width: 35px; height: 35px; margin-right: 15px; }
        
        .section { margin-bottom: 35px; }
        .section h3 { font-size: 20px; font-weight: 800; margin-bottom: 15px; color: #000; }
        .section h4 { font-size: 17px; margin: 15px 0 8px; color: var(--sub); }
        
        ul { padding-left: 22px; margin: 0; }
        li { margin-bottom: 10px; }
        .x-mark { color: var(--red); font-weight: 800; margin-left: 5px; }
        .notice-box { background: #fff9db; border-left: 4px solid #fcc419; padding: 15px; border-radius: 4px; font-weight: 700; margin-bottom: 25px; }
        
        @media (max-width: 600px) { .btn-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header-img"></div>

    <div class="container">
        <div class="profile">
            <img src="https://file.notion.so/f/f/584e2286-0a7a-8153-b191-0003916f36db/60abf019-d18d-479f-875a-75e9a4bba5e5/7e87df444e9593af.gif?table=block&id=27be2286-0a7a-802d-827a-e3852852a9d2&spaceId=584e2286-0a7a-8153-b191-0003916f36db&expirationTimestamp=1776024000000&signature=DPEpajqUBgQ9EAS3j9voTlNnHlg5KR1xk7Jj17YzVoY">
        </div>

        <div id="mainMenu" class="menu-page">
            <h1>조밈 시참 설명서</h1>
            <p class="top-desc">컨텐츠 참여 전 아래 항목을 선택해 규칙을 확인하세요.</p>

            <div class="label">규칙</div>
            <div class="btn-grid">
                <div class="btn" onclick="showPage('chat')"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png"><span>채팅 규칙</span></div>
                <div class="btn" onclick="showPage('join')"><img src="https://cdn-icons-png.flaticon.com/512/1067/1067561.png"><span>참여 규칙</span></div>
            </div>

            <div class="label">게임 룰</div>
            <div class="btn-grid">
                <div class="btn" onclick="showPage('wild')"><img src="https://cdn-icons-png.flaticon.com/512/616/616412.png"><span>야생 배틀로얄</span></div>
                <div class="btn" onclick="showPage('school')"><img src="https://cdn-icons-png.flaticon.com/512/167/167707.png"><span>학교 술래잡기</span></div>
                <div class="btn" onclick="showPage('catch')"><img src="https://cdn-icons-png.flaticon.com/512/824/824231.png"><span>조밈을 잡아라!</span></div>
                <div class="btn" onclick="showPage('mind')"><img src="https://cdn-icons-png.flaticon.com/512/588/588308.png"><span>캐치마인드</span></div>
            </div>
        </div>

        <div id="detailPage" class="detail-page">
            <div class="back-nav" onclick="showMenu()">← 뒤로가기</div>
            <div id="detailContent" class="content"></div>
        </div>
    </div>

    <script>
        const contentData = {
            chat: `
                <h2><img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png"> 채팅 규칙</h2>
                <div class="section">
                    <h3>부적절한 언행 금지</h3>
                    <ul>
                        <li>특정 커뮤니티 용어 및 말투 <span class="x-mark">X</span></li>
                        <li>적절하지 않은 상황에서 긁기 <span class="x-mark">X</span></li>
                        <li>과한 욕설 <span class="x-mark">X</span> (적절하게 사용 가능)</li>
                        <li>반말 사용 <span class="x-mark">X</span></li>
                        <li>징징대기 <span class="x-mark">X</span></li>
                        <li>싸울 시 잘잘못 관련 없이 싸운 사람 모두 밴</li>
                    </ul>
                    <h3>타스트리머 및 타유튜버 언급 자제</h3>
                    <ul>
                        <li>홍보성 멘트 <span class="x-mark">X</span></li>
                        <li>뜬금없이 언급 <span class="x-mark">X</span></li>
                    </ul>
                    <h3>과한 친목 금지</h3>
                    <ul>
                        <li>시청자끼리 서로 닉 언급 <span class="x-mark">X</span></li>
                        <li>사적인 쪽지 및 디엠 <span class="x-mark">X</span></li>
                    </ul>
                    <h3>일기 및 무지성 요청 금지</h3>
                    <ul>
                        <li>도능 해주세요! or 딴 거 해요! <span class="x-mark">X</span></li>
                        <li>저 오늘 ~~ 했어요 <span class="x-mark">X</span></li>
                    </ul>
                    <h3>공지 안 읽고 질문 금지</h3>
                    <ul>
                        <li>시참 어떻게 해요? <span class="x-mark">X</span> → 참여 안내서 참고</li>
                        <li>이거 안되는데요? <span class="x-mark">X</span> → 디코 문의 채널</li>
                        <li>밴 당하고 규칙 몰랐어요 <span class="x-mark">X</span></li>
                    </ul>
                    <p><strong>이 외에도 관리자 판단 하에 선 넘으면 즉시 처벌</strong></p>
                    <p style="color:gray">디스코드 내에서도 해당 규칙을 지켜주세요</p>
                </div>`,
            join: `
                <h2><img src="https://cdn-icons-png.flaticon.com/512/1067/1067561.png"> 참여 규칙</h2>
                <div class="notice-box">※ 컨텐츠 참여 시, 방송 음성을 반드시 청취하시며 참여해 주셔야 합니다! ※</div>
                <div class="section">
                    <h3>친목 금지</h3>
                    <ul>
                        <li>게임 내에서 귓속말 주고받기 <span class="x-mark">X</span></li>
                        <li>채팅으로 닉 언급 및 대화 <span class="x-mark">X</span></li>
                    </ul>
                    <h3>비매너 금지</h3>
                    <ul>
                        <li>아무리 경쟁이라도 민폐가 되는 행위 <span class="x-mark">X</span></li>
                        <li>게임 룰 숙지하기 (게임마다 룰이 다름)</li>
                        <li>특정 플레이어 저격 <span class="x-mark">X</span></li>
                    </ul>
                    <h3>방송 진행 방해 금지</h3>
                    <ul>
                        <li>방송각을 해치는 행위 <span class="x-mark">X</span></li>
                        <li>알잘딱으로 행동하기</li>
                        <li>조밈 저격 <span class="x-mark">X</span> (따라다니는 행위)</li>
                    </ul>
                    <h3>핵 사용 금지</h3>
                    <ul>
                        <li>편의성 모드를 제외한 비정상적인 모드 <span class="x-mark">X</span></li>
                        <li>이벤트 진행 도중 핵 사용 시 탈락</li>
                    </ul>
                    <p><strong>이 외에도 관리자 판단 하에 선 넘으면 즉시 처벌</strong></p>
                </div>`,
            wild: `
                <h2><img src="https://cdn-icons-png.flaticon.com/512/616/616412.png"> 야생 배틀로얄</h2>
                <div class="section">
                    <h3>게임 방식</h3>
                    <ul>
                        <li><strong>게임이 시작되면 무적 시간 15분이 주어짐</strong></li>
                        <li><strong>15분동안 야생에서 자유롭게 파밍 후, 무적 시간이 끝나면 PVP 진행</strong></li>
                        <li><strong>PVP가 진행되는 동안, 자기장이 x=0, y=0 좌표를 기준으로 줄어듦</strong></li>
                        <li><strong>4차 자기장까지 줄어들게 되면 데스매치장으로 이동 후, 데스매치 진행</strong></li>
                        <li>최후의 1인은 우승</li>
                    </ul>
                    <h3>상세 규칙</h3>
                    <ul><li>티밍 <span class="x-mark">X</span></li></ul>
                </div>`,
            school: `
                <h2><img src="https://cdn-icons-png.flaticon.com/512/167/167707.png"> 학교 술래잡기</h2>
                <div class="section">
                    <h3>게임 방식</h3>
                    <ul>
                        <li><strong>게임이 시작되면 도망자는 학교에서 생존해야 함</strong></li>
                        <li><strong>도망자는 복도에서만 생성 되는 금을 획득 후, 특수 아이템으로 교환 가능</strong></li>
                        <li><strong>술래가 맵에 설치된 발전기를 모두 파괴하면 도망자에게 어둠 디버프와 주기적인 발광 효과가 적용됨</strong></li>
                        <li>파괴된 발전기는 도망자가 수리할 수 있음 (수리 완료 시, 금 8개 지급)</li>
                        <li><strong>도망자는 맵 곳곳에 배치된 구급함을 열면 특별한 아이템 획득 가능</strong></li>
                        <li><strong>제한 시간이 끝날 때까지 도망자가 생존하면 도망자 승리</strong></li>
                        <li>도망자 전원이 탈락하면 술래 승리</li>
                    </ul>
                    <h3>상세 규칙</h3>
                    <ul>
                        <li>맵 탈주 <span class="x-mark">X</span></li>
                        <li>고의적인 트롤 <span class="x-mark">X</span></li>
                        <li>버그 악용 <span class="x-mark">X</span></li>
                    </ul>
                </div>`,
            catch: `
                <h2><img src="https://cdn-icons-png.flaticon.com/512/824/824231.png"> 조밈을 잡아라!</h2>
                <div class="section">
                    <h3>게임 방식</h3>
                    <ul>
                        <li><strong>게임이 시작되면 조밈은 랜덤 위치에서 출발 + 5분 타이머 가동</strong></li>
                        <li><strong>타이머가 끝나면 시청자들은 추격 시작 - 나침반으로 추적 가능</strong></li>
                        <li><strong>조밈이 시청자에게 잡히면 게임 종료!</strong></li>
                        <li><strong>조밈을 잡은 시청자는 우승</strong></li>
                    </ul>
                </div>`,
            mind: `
                <h2><img src="https://cdn-icons-png.flaticon.com/512/588/588308.png"> 캐치마인드</h2>
                <div class="section">
                    <h3>게임 방식</h3>
                    <ul>
                        <li><strong>게임이 시작되면 출제자가 주제를 지정 후, 해당 주제를 바탕으로 건축 진행</strong></li>
                        <li><strong>정답을 가장 먼저 맞힌 참가자는 우승</strong></li>
                    </ul>
                </div>`
        };

        function showPage(pageId) {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('detailPage').style.display = 'block';
            document.getElementById('detailContent').innerHTML = contentData[pageId];
            window.scrollTo(0, 0);
        }

        function showMenu() {
            document.getElementById('mainMenu').style.display = 'block';
            document.getElementById('detailPage').style.display = 'none';
        }
    </script>
</body>
</html>
