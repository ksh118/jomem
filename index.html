<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조밈 시참 설명서</title>
<link rel="icon" href="https://i.ibb.co/7JqdNgxn/image.png" type="image/png">
<meta property="og:title" content="조밈 시참 설명서">
<meta property="og:description" content="5월 2일(토) 오후 4시 생방송 | PVP, 야생 실력">
<meta property="og:image" content="https://i.ibb.co/7JqdNgxn/image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://i.ibb.co/7JqdNgxn/image.png">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f7f7f5;
  --bg3: #ebebea;
  --text: #111111;
  --text2: #444440;
  --text3: #7a7a72;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --accent: #d4793a;
  --accent-bg: #fdf3e7;
  --accent-text: #7c3e0e;
  --nav-bg: rgba(255,255,255,0.94);
  --gold-bg: #fdf6dc;
  --gold-text: #7a5c00;
  --silver-bg: #f2f2f2;
  --silver-text: #555;
  --bronze-bg: #fdeee3;
  --bronze-text: #7a3800;
  --btn-bg: #f0f0ee;
  --btn-hover: #e4e4e0;
  --modal-bg: #ffffff;
  --section-border: rgba(0,0,0,0.12);
  --danger-bg: #fdf0f0;
  --danger-color: #9b2c2c;
  --win-bg: #f0f8f0;
  --win-color: #1a5c1a;
  --win-border: rgba(0,100,0,0.15);
  --discord-embed-bg: #f7f7f5;
  --code-bg: #f0f0ee;
}
[data-theme="dark"] {
  --bg: #1a1a18;
  --bg2: #242422;
  --bg3: #2e2e2c;
  --text: #e8e8e2;
  --text2: #c4c4bc;
  --text3: #8a8a82;
  --border: rgba(255,255,255,0.09);
  --border2: rgba(255,255,255,0.18);
  --accent: #f0a060;
  --accent-bg: #3d2008;
  --accent-text: #f5b880;
  --nav-bg: rgba(26,26,24,0.95);
  --gold-bg: #2e2200;
  --gold-text: #f0d060;
  --silver-bg: #2a2a28;
  --silver-text: #d0d0c8;
  --bronze-bg: #2e1600;
  --bronze-text: #f0a060;
  --btn-bg: #2e2e2c;
  --btn-hover: #383836;
  --modal-bg: #1a1a18;
  --section-border: rgba(255,255,255,0.14);
  --danger-bg: #3a1010;
  --danger-color: #f08080;
  --win-bg: #0e2a0e;
  --win-color: #80d080;
  --win-border: rgba(0,200,0,0.15);
  --discord-embed-bg: #242422;
  --code-bg: #2e2e2c;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;
  transition:background .25s,color .25s;overflow-x:hidden;
}

/* NAV */
nav{
  position:sticky;top:0;z-index:200;
  background:var(--nav-bg);border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
}
.nav-left{display:flex;align-items:center;gap:8px}
.nav-logo{width:26px;height:26px;border-radius:6px;object-fit:cover}
.nav-title{font-size:14px;font-weight:700;color:var(--text)}
.theme-btn{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);
  background:transparent;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:var(--text3);transition:background .15s,color .15s;
}
.theme-btn:hover{background:var(--bg3);color:var(--text)}

/* MAIN */
.main{max-width:600px;margin:0 auto;padding:28px 18px 80px}

/* LAYOUT: side-by-side on desktop */
.top-layout{
  display:flex;gap:20px;align-items:flex-start;margin-bottom:28px;
}
.hero-col{flex:0 0 200px}
.hero-wrap{
  border-radius:14px;overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.18);
}
.hero-wrap img{width:100%;display:block}
.info-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center}

/* TITLE SECTION */
.event-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--accent-bg);color:var(--accent-text);
  border:1px solid rgba(212,121,58,.25);border-radius:20px;
  padding:3px 10px;font-size:11.5px;font-weight:700;
  margin-bottom:10px;letter-spacing:.04em;
}
.main-title{
  font-size:26px;font-weight:900;letter-spacing:-.5px;line-height:1.2;
  margin-bottom:6px;
}

/* INFO CARDS */
.info-cards{display:flex;flex-direction:column;gap:8px;margin-top:12px;width:100%}
.info-card{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;
}
.info-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.info-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:1px;letter-spacing:.02em}
.info-value{font-size:14px;font-weight:700;color:var(--text)}

/* TIMER */
.timer-section{margin-bottom:24px}
.section-label{
  font-size:11.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--text3);margin-bottom:10px;
}
.timer-wrap{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:14px;padding:18px 16px;text-align:center;
}
.timer-grid{display:flex;justify-content:center;gap:10px;align-items:center}
.timer-unit{display:flex;flex-direction:column;align-items:center;gap:4px}
.timer-num{
  font-size:34px;font-weight:900;letter-spacing:-.02em;
  background:var(--bg3);border-radius:10px;
  padding:7px 12px;min-width:62px;
  line-height:1;color:var(--text);
  border:1px solid var(--border2);
  font-variant-numeric:tabular-nums;
  transition:background .25s,color .25s,border-color .25s;
}
.timer-sep{font-size:28px;font-weight:900;color:var(--text3);margin-top:-14px}
.timer-lbl{font-size:10.5px;color:var(--text3);font-weight:600;letter-spacing:.04em}
.timer-ended{font-size:17px;font-weight:700;color:var(--accent);padding:6px 0}

/* PRIZES */
.prizes-section{margin-bottom:24px}
.prize-list{display:flex;flex-direction:column;gap:7px}
.prize-row{
  display:flex;align-items:center;gap:12px;
  border-radius:12px;padding:13px 15px;border:1px solid transparent;
}
.prize-1{background:var(--gold-bg);border-color:rgba(200,160,0,.25)}
.prize-2{background:var(--silver-bg);border-color:var(--border)}
.prize-3{background:var(--bronze-bg);border-color:rgba(180,80,10,.18)}
.prize-medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.prize-rank{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:1px}
.prize-name{font-size:14px;font-weight:700}
.prize-1 .prize-name{color:var(--gold-text)}
.prize-2 .prize-name{color:var(--silver-text)}
.prize-3 .prize-name{color:var(--bronze-text)}

/* YOUTUBE NOTICE */
.yt-notice{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:13px 15px;margin-bottom:24px;
  text-decoration:none;color:var(--text);
  transition:background .15s,transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s;
  cursor:pointer;
}
.yt-notice:hover{background:var(--bg3);transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.1)}
.yt-icon{
  width:36px;height:36px;border-radius:8px;background:#ff0000;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.yt-label{font-size:11.5px;color:var(--text3);font-weight:600;margin-bottom:1px}
.yt-text{font-size:13.5px;font-weight:700;color:var(--text)}

/* BUTTONS */
.apply-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:17px 24px;
  background:var(--accent);color:#fff;
  border:none;border-radius:14px;
  font-size:16px;font-weight:800;cursor:pointer;
  text-decoration:none;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,background .15s;
  box-shadow:0 4px 22px rgba(212,121,58,.35);
  margin-bottom:10px;
}
.apply-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(212,121,58,.45)}
.apply-btn:active{transform:translateY(0);box-shadow:none}

/* 3 MANUAL BUTTONS */
.manual-btns{display:flex;gap:8px;margin-bottom:0}
.manual-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  padding:13px 8px;
  background:var(--btn-bg);color:var(--text2);
  border:1px solid var(--border2);border-radius:12px;
  font-size:12.5px;font-weight:600;cursor:pointer;
  transition:background .15s,transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s,color .15s;
  text-align:center;line-height:1.3;
}
.manual-btn:hover{background:var(--btn-hover);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1);color:var(--text)}
.manual-btn:active{transform:translateY(0);box-shadow:none}
.manual-btn .mb-icon{font-size:18px}

/* FOOTER */
.footer{text-align:center;font-size:11.5px;color:var(--text3);padding-top:20px;border-top:1px solid var(--border);margin-top:8px}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0);transition:background .3s;
}
.modal-overlay.open{display:block;background:rgba(0,0,0,.5)}
.modal-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:501;
  background:var(--modal-bg);border-radius:20px 20px 0 0;
  max-height:88vh;overflow-y:auto;padding:0 0 40px;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(.4,0,.2,1),background .25s;
  scrollbar-width:none;
}
.modal-sheet::-webkit-scrollbar{display:none}
.modal-sheet.open{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--modal-bg);z-index:10;
}
.modal-title{font-size:17px;font-weight:700}
.modal-close{
  width:32px;height:32px;border-radius:8px;border:none;
  background:var(--btn-bg);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:300;transition:background .15s;
}
.modal-close:hover{background:var(--btn-hover)}
.modal-body{padding:20px}

/* MANUAL INNER STYLES */
.m-section{margin-bottom:26px}
.m-title{font-size:14.5px;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--section-border);color:var(--text);text-align:center}
.rule-list{list-style:none;padding:0}
.rule-list li{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:7px;font-size:14px;color:var(--text);font-weight:500;transition:background .12s;justify-content:center;text-align:left}
.rule-list li:hover{background:var(--bg3)}
.rx{width:17px;height:17px;border-radius:4px;background:var(--danger-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px}
.rx svg{width:9px;height:9px;stroke:var(--danger-color)}
.notice-box{display:flex;align-items:flex-start;gap:10px;background:var(--accent-bg);border:1px solid rgba(212,121,58,.22);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--accent-text);margin-bottom:16px}
.danger-box{background:var(--danger-bg);border:1px solid rgba(155,44,44,.18);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--danger-color)}
.win-box{background:var(--win-bg);border:1px solid var(--win-border);border-radius:10px;padding:11px 14px;font-size:13.5px;color:var(--win-color);font-weight:600;margin:14px 0}
.step{display:flex;gap:12px;margin-bottom:16px}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.step-body h4{font-size:13.5px;font-weight:600;margin-bottom:3px}
.step-body p{font-size:13px;color:var(--text3)}
.discord-embed-btn{
  background:var(--discord-embed-bg);border:1px solid var(--border);
  border-left:3px solid #5865F2;border-radius:0 8px 8px 0;
  padding:12px 14px;margin:10px 0;
  display:block;text-decoration:none;cursor:pointer;
  transition:background .15s,transform .12s;
}
.discord-embed-btn:hover{background:var(--btn-hover);transform:translateX(2px)}
.de-title{font-size:13.5px;font-weight:700;color:#5865F2;margin-bottom:3px}
.de-desc{font-size:12.5px;color:var(--text3);margin-bottom:6px}
.de-link-row{font-size:12.5px;color:#5865F2;display:flex;align-items:center;gap:5px}
.mode-p{font-size:14px;color:var(--text2);margin-bottom:7px;line-height:1.65}
.sub-title{font-size:13.5px;font-weight:600;margin:14px 0 5px;color:var(--text2)}
.code-wrap{display:flex;align-items:stretch;background:var(--code-bg);border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin:5px 0}
.code-line{flex:1;padding:9px 13px;font-family:'SF Mono','Fira Code',monospace;font-size:13px;color:var(--text)}
.copy-btn-sm{padding:0 13px;background:transparent;border:none;border-left:1px solid var(--border2);font-size:11px;color:var(--text3);cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn-sm:hover{background:var(--btn-hover);color:var(--text)}
.copy-btn-sm.ok{color:#2e7d32}

@media(max-width:520px){
  .top-layout{flex-direction:column;gap:18px}
  .hero-col{flex:none;width:100%;max-width:280px;margin:0 auto}
  .info-col{align-items:center;text-align:center}
  .event-badge{margin:0 auto 10px}
  .main-title{font-size:24px;text-align:center}
  .info-cards{align-items:center;width:100%}
  .info-card{width:100%;max-width:100%}
  .timer-grid{gap:4px;flex-wrap:nowrap}
  .timer-num{font-size:22px;min-width:40px;padding:5px 6px}
  .timer-sep{font-size:18px}
  #tMillis{font-size:16px!important;min-width:38px!important;padding:7px 5px!important}
  .manual-btns{gap:6px}
  .manual-btn{padding:11px 6px;font-size:11.5px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <img class="nav-logo" src="https://i.ibb.co/7JqdNgxn/image.png" alt="조밈">
    <span class="nav-title">마크 대회 공지</span>
  </div>
  <div>
    <button class="theme-btn" onclick="toggleTheme()">
      <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</nav>

<div class="main">

  <!-- TOP: image + title side by side -->
  <div class="top-layout">
    <div class="hero-col">
      <div class="hero-wrap">
        <img id="heroImg" alt="마크 대회 - 인원 모집">
      </div>
    </div>
    <div class="info-col">
      <div class="event-badge">🎮 마인크래프트 대회</div>

      <div class="info-cards">
        <div class="info-card">
          <div class="info-icon">📅</div>
          <div>
            <div class="info-label">일정</div>
            <div class="info-value">5월 2일 (토) 오후 4시</div>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon">🎮</div>
          <div>
            <div class="info-label">종목</div>
            <div class="info-value">PVP, 야생 실력</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TIMER -->
  <div class="timer-section">
    <div class="section-label">⏱ 대회까지 남은 시간 — 5월 2일 (토) 오후 4시 생방송</div>
    <div class="timer-wrap">
      <div id="timerDisplay" class="timer-grid">
        <div class="timer-unit">
          <div class="timer-num" id="tHours">00</div>
          <div class="timer-lbl">시간</div>

        <div class="timer-sep">:</div>
        <div class="timer-unit">
          <div class="timer-num" id="tMins">00</div>
          <div class="timer-lbl">분</div>
        </div>
        <div class="timer-sep">:</div>
        <div class="timer-unit">
          <div class="timer-num" id="tSecs">00</div>
          <div class="timer-lbl">초</div>
        </div>
        <div class="timer-sep" style="font-size:18px;margin-top:-6px">.</div>
        <div class="timer-unit">
          <div class="timer-num" id="tMillis" style="font-size:22px;min-width:52px;padding:10px 8px;letter-spacing:-.03em">000</div>
          <div class="timer-lbl">ms</div>
        </div>
      </div>
    </div>
  </div>

  <!-- PRIZES -->
  <div class="prizes-section">
    <div class="section-label">🏆 우승 상품</div>
    <div class="prize-list">
      <div class="prize-row prize-1">

      <div class="prize-row prize-2">
        <div class="prize-medal">🥈</div>
        <div><div class="prize-rank">2등</div><div class="prize-name">햄버거 세트</div></div>
      </div>
      <div class="prize-row prize-3">
        <div class="prize-medal">🥉</div>
        <div><div class="prize-rank">3등</div><div class="prize-name">햄버거 세트</div></div>
      </div>
    </div>
  </div>

  <!-- YOUTUBE NOTICE -->
  <a class="yt-notice" href="http://youtube.com/post/UgkxcLBXoo2NUKrB8sVUz3SJ8YR9XuqbSBpy?si=To3sJKmidawypRDt" target="_blank" rel="noopener">

      <svg width="18" height="14" viewBox="0 0 24 18" fill="white"><path d="M23.5 2.7S23.2.8 22.4.1C21.4-.9 20.3-.9 19.8-.8 16.5 0 12 0 12 0s-4.5 0-7.8.2C3.7-.9 2.6-.9 1.6.1.8.8.5 2.7.5 2.7S0 4.9 0 7.1v2.1c0 2.2.5 4.4.5 4.4s.3 1.9 1.1 2.6c1 1 2.4.9 3 1C6.1 17.4 12 17.5 12 17.5s4.5 0 7.8-.3c.5-.1 1.6-.1 2.6-1.1.8-.7 1.1-2.6 1.1-2.6S24 11.3 24 9.1V7c0-2.2-.5-4.3-.5-4.3zM9.5 12V5l6.5 3.5L9.5 12z"/></svg>
    </div>
    <div>
      <div class="yt-label">자세한 사항은</div>
      <div class="yt-text">조밈 유튜브 게시물을 확인하세요 →</div>
    </div>
  </a>

  <!-- APPLY BUTTON -->
  <a class="apply-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSe0D_X4bvcNHZHRDx2NzZZ03Lr5zgUrgMzFvjPkhBSc4HbE5A/viewform" target="_blank" rel="noopener">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    신청하기 (구글 폼)
  </a>

  <!-- 3 MANUAL BUTTONS -->
  <div class="manual-btns">
    <button class="manual-btn" onclick="openManual('chat')">

// ── TIMER ──
function pad(n, len){ return String(n).padStart(len||2,'0'); }
const startTime = new Date('2026-05-02T07:00:00Z'); // 5/2 16:00 KST

function updateTimer(){
  const now = new Date();
  const diff = startTime - now; // 남은 시간 (줄어듦)

  if(diff <= 0){
    // 대회 시작!
    document.getElementById('timerDisplay').innerHTML = '<div class="timer-ended">🎉 방송 및 대회가 시작되었습니다!</div>';
    return;
  }

  // 대회 시작 전 — 카운트다운 (줄어듦)
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  const ms = Math.floor(diff%1000);
  document.getElementById('timerDisplay').innerHTML = `
    <div class="timer-unit">
      <div class="timer-num">${pad(d)}</div>
      <div class="timer-lbl">일</div>
    </div>
    <div class="timer-sep">:</div>

function openManual(type){
  const data = MANUAL[type];
  document.getElementById('modalTitle').textContent = data.title;
  document.getElementById('modalBody').innerHTML = data.html;
  document.getElementById('modalOverlay').classList.add('open');
  const sheet = document.getElementById('modalSheet');
  sheet.classList.add('open');
  sheet.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeManual(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalSheet').classList.remove('open');
  document.body.style.overflow = '';
}

// ── THEME ──
function toggleTheme(){
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const t = dark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('jomim-theme', t);
  updateIcon(t);
}
function updateIcon(t){
  document.getElementById('themeIcon').innerHTML = t === 'dark'
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}
(function(){
  const saved = localStorage.getItem('jomim-theme');
  const pref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  const t = saved || pref;
  document.documentElement.setAttribute('data-theme', t);
  updateIcon(t);
})();
</script>
