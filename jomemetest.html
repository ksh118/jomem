function openM(type){
  document.getElementById('shTtl').textContent=M[type].ttl;
  document.getElementById('shBody').innerHTML=M[type].html;
  document.getElementById('ov').classList.add('on');
  const s=document.getElementById('sh');
  s.classList.add('on');s.scrollTop=0;
  document.body.style.overflow='hidden';
}
function closeM(){
  document.getElementById('ov').classList.remove('on');
  document.getElementById('sh').classList.remove('on');
  document.body.style.overflow='';
}

// THEME
function toggleTheme(){
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  const t=d?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('jomim-theme',t);
  setIcon(t);
}
function setIcon(t){
  document.getElementById('themeIcon').innerHTML=t==='dark'
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    :'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}
(function(){
  const t=localStorage.getItem('jomim-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');

})();
